version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: finance_postgres
    environment:
      POSTGRES_DB: financedb
      POSTGRES_USER: finance
      POSTGRES_PASSWORD: finance_secret
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U finance -d financedb"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: ./backend
    container_name: finance_api
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DB_URL: jdbc:postgresql://postgres:5432/financedb
      DB_USERNAME: finance
      DB_PASSWORD: finance_secret
      JWT_SECRET: "replace-this-with-64-char-random-secret-before-production-deploy"
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    image: node:20-alpine
    container_name: finance_frontend
    working_dir: /app
    volumes:
      - ./frontend:/app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0"
    ports:
      - "5173:5173"
    depends_on:
      - api

volumes:
  postgres_data:
