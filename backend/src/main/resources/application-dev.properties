spring.datasource.url=jdbc:h2:mem:financedb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.open-in-view=false
app.jwt.secret=3f7d9a1b2c4e6f8a0b2d4f6a8c0e2f4a6b8c0d2e4f6a8b0c2d4e6f8a0b2c4e6f
app.jwt.expiration-ms=86400000
app.jwt.refresh-expiration-ms=604800000
app.rate-limit.capacity=200
app.rate-limit.refill-tokens=200
app.rate-limit.refill-seconds=60
app.scheduler.recurring-cron=0 0 1 * * *
app.scheduler.budget-sweep-cron=0 0 2 * * *
app.budget.warning-threshold=80
app.budget.critical-threshold=100
app.seeder.enabled=true
logging.level.com.finance.dashboard=DEBUG
logging.level.org.springframework.security=WARN
