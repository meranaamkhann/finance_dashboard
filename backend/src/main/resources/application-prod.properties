# PostgreSQL (prod — inject via env vars)
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.h2.console.enabled=false

app.jwt.secret=${JWT_SECRET}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}
app.jwt.refresh-expiration-ms=${JWT_REFRESH_EXPIRATION_MS:604800000}

app.rate-limit.capacity=${RATE_LIMIT_CAPACITY:200}
app.rate-limit.refill-tokens=${RATE_LIMIT_REFILL:200}
app.rate-limit.refill-seconds=${RATE_LIMIT_SECONDS:60}

app.scheduler.recurring-cron=0 0 1 * * *
app.scheduler.budget-sweep-cron=0 0 2 * * *
app.budget.warning-threshold=80
app.budget.critical-threshold=100
app.seeder.enabled=false

logging.level.com.finance.dashboard=INFO
logging.level.root=WARN
