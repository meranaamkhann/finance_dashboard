spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.h2.console.enabled=false
app.jwt.secret=test-secret-key-must-be-at-least-32-chars-long-for-hmac
app.jwt.expiration-ms=3600000
app.jwt.refresh-expiration-ms=86400000
app.seeder.enabled=true
app.rate-limit.capacity=10000
app.rate-limit.refill-tokens=10000
app.rate-limit.refill-seconds=1
logging.level.com.finance.dashboard=WARN
logging.level.org.springframework.security=WARN
