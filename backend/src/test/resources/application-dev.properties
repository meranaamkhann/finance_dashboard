# Test database - H2 in-memory
spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.h2.console.enabled=false

# JWT
app.jwt.secret=test-secret-key-must-be-at-least-32-chars-long-ok
app.jwt.expiration-ms=3600000
app.jwt.refresh-expiration-ms=86400000

# Rate limiting - relaxed for tests
app.rate-limit.capacity=100000
app.rate-limit.refill-tokens=100000
app.rate-limit.refill-seconds=1

# Scheduler off during tests
app.scheduler.recurring-cron=0 0 1 1 1 ?
app.scheduler.budget-sweep-cron=0 0 2 1 1 ?
app.budget.warning-threshold=80
app.budget.critical-threshold=100

# Seeder ON so integration tests have data
app.seeder.enabled=true

logging.level.com.finance.dashboard=WARN
logging.level.org.springframework.security=WARN
logging.level.org.hibernate.SQL=WARN
