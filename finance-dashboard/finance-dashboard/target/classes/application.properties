server.port=8080
spring.application.name=finance-dashboard

# ── H2 In-Memory Database ─────────────────────────────────────────────────────
spring.datasource.url=jdbc:h2:mem:financedb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=MySQL
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ── JPA ───────────────────────────────────────────────────────────────────────
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# ── JWT ───────────────────────────────────────────────────────────────────────
app.jwt.secret=4261656C64756E67404A575453656372657434323146696E616E636544617368626F617264323032345365637265744B6579537472696E67
app.jwt.expiration-ms=86400000
app.jwt.refresh-expiration-ms=604800000

# ── Rate Limiting ─────────────────────────────────────────────────────────────
app.rate-limit.capacity=100
app.rate-limit.refill-tokens=100
app.rate-limit.refill-seconds=60

# ── Recurring Transactions Scheduler ─────────────────────────────────────────
app.scheduler.recurring-cron=0 0 1 * * *

# ── Budget Alert Thresholds (%) ───────────────────────────────────────────────
app.budget.warning-threshold=80
app.budget.critical-threshold=100

# ── Logging ───────────────────────────────────────────────────────────────────
logging.level.com.finance.dashboard=INFO
logging.level.org.springframework.security=WARN
logging.pattern.console=%d{HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n
